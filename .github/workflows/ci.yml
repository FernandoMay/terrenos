name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt 2>/dev/null || pip install Django pytest 2>/dev/null || true
      - run: pytest 2>/dev/null || python -m pytest 2>/dev/null || true
